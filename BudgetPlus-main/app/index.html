<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>BudgetPlus — ניהול תקציב חודשי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css">
<!-- Chart.js + SheetJS via CDN, but app works without them (charts+xlsx features just disabled). -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" onerror="window.__noChart=1"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js" onerror="window.__noXLSX=1"></script>
<!-- Firebase (compat build — works with plain <script> tags). -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>

  <div id="root"></div>

  <!-- Order matters: config → sync (wraps localStorage) → seed/db/calc → auth → app. -->
  <script src="./js/firebase-config.js"></script>
  <script src="./js/sync.js"></script>
  <script src="./js/seed.js"></script>
  <script src="./js/db.js"></script>
  <script src="./js/calc.js"></script>
  <script src="./js/auth.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
